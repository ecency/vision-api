# Swarm stack file for the API service. Deploy as `docker stack deploy -c
# docker-compose.yml vision` to create the `vision_vapi` service that CI's
# digest deploys and the README rollback commands target. The image is the
# CI-published ecency/api (the build section is for local `docker compose
# build` convenience; stack deploy ignores it and pulls the image).
version: '3.7'

services:
  vapi:
    image: ecency/api:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PRIVATE_API_ADDR
      - PRIVATE_API_AUTH
      - HIVESIGNER_SECRET
      - SEARCH_API_ADDR
      - SEARCH_API_SECRET
      - STRIPE_INTERNAL_SECRET
      - TURNSTILE_SECRET
      - CAPTCHA_MODE
      - BLOCKSTREAM_CLIENT_ID
      - BLOCKSTREAM_CLIENT_SECRET
      - HELIUS_API_KEY
      - ETH_RPC_URLS
      - BNB_RPC_URLS
      - SOL_RPC_URLS
      - BTC_ESPLORA_URLS
      - Logging__LogLevel__Default
    ports:
      - "4000:4000"
    # Bound container logs so they can never grow unchecked on the host
    # (the service also defaults to Warning-level logging).
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      default: null
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.9"
          memory: 2048M
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 15s
networks:
  default:
    name: vision-api
