# Drop-in equivalent of the repo-root docker-compose.yml, pointing at the C#
# image. Same service name, port, env, and swarm deploy policy so it can replace
# the Node image in the vision_vapi stack with no other changes.
version: '3.7'

services:
  app:
    image: ecency/api-csharp:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PRIVATE_API_ADDR
      - PRIVATE_API_AUTH
      - HIVESIGNER_SECRET
      - SEARCH_API_ADDR
      - SEARCH_API_SECRET
      - STRIPE_INTERNAL_SECRET
      - TURNSTILE_SECRET
      - CAPTCHA_MODE
      - BLOCKSTREAM_CLIENT_ID
      - BLOCKSTREAM_CLIENT_SECRET
      - HELIUS_API_KEY
      - ETH_RPC_URLS
      - BNB_RPC_URLS
      - SOL_RPC_URLS
      - BTC_ESPLORA_URLS
    ports:
      - "4000:4000"
    networks:
      default: null
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.9"
          memory: 2048M
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 15s
networks:
  default:
    name: vision-api
